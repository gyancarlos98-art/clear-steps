<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What's Really Slowing You Down? — 60-Second Assessment</title>
<meta name="description" content="A 60-second assessment to find your exact starting point for a calmer, more organized week.">
<style>
  :root{--ink:#1c2733;--soft:#5b6b7a;--line:#e6ebf0;--go:#1e88e5;--go2:#1565c0;--bg:#fff;--box:#f5f8fb}
  @media(prefers-color-scheme:dark){:root{--ink:#e8eef4;--soft:#9fb0c0;--line:#25313d;--bg:#0f151b;--box:#161f28}}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:-apple-system,Segoe UI,Roboto,sans-serif;color:var(--ink);background:var(--bg);line-height:1.6;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .wrap{max-width:560px;width:100%}
  .brand{text-align:center;font-weight:800;letter-spacing:2px;font-size:.75rem;color:var(--go);margin-bottom:20px}
  .card{background:var(--box);border:1px solid var(--line);border-radius:14px;padding:32px 28px}
  .bar{height:4px;background:var(--line);border-radius:2px;margin-bottom:24px;overflow:hidden}
  .bar-fill{height:100%;background:var(--go);border-radius:2px;transition:width .3s}
  h1{font-size:1.35rem;line-height:1.3;margin-bottom:6px}
  .sub{color:var(--soft);font-size:.92rem;margin-bottom:22px}
  .opt{display:block;width:100%;text-align:left;background:var(--bg);border:1.5px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:10px;cursor:pointer;font-size:.98rem;color:var(--ink)}
  .opt:hover{border-color:var(--go)}
  .step{color:var(--soft);font-size:.8rem;text-align:center;margin-bottom:6px}
  .result h2{font-size:1.5rem;margin-bottom:10px}
  .result .tag{display:inline-block;background:var(--go);color:#fff;font-size:.72rem;font-weight:700;letter-spacing:1px;padding:4px 12px;border-radius:100px;margin-bottom:14px}
  .result p{margin-bottom:14px;color:var(--ink)}
  .result .reco{background:var(--bg);border-left:3px solid var(--go);border-radius:8px;padding:14px 16px;margin:16px 0;font-size:.94rem}
  .cta{display:block;background:var(--go);color:#fff;text-align:center;font-weight:800;padding:16px;border-radius:10px;text-decoration:none;margin-top:18px}
  .cta:hover{background:var(--go2)}
  .apoio{text-align:center;color:var(--soft);font-size:.82rem;margin-top:10px}
  .hidden{display:none}
  .restart{display:block;text-align:center;color:var(--soft);font-size:.82rem;margin-top:16px;cursor:pointer;text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">CLEAR STEPS</div>
  <div class="card">

    <div id="quiz">
      <div class="bar"><div class="bar-fill" id="bar" style="width:0%"></div></div>
      <div class="step" id="step">Question 1 of 6</div>
      <h1 id="q-text"></h1>
      <p class="sub" id="q-sub"></p>
      <div id="options"></div>
    </div>

    <div id="result" class="result hidden"></div>

  </div>
</div>

<script>
// ---- 60-second assessment: pure client-side, no backend, no data leaves the browser ----
const QUESTIONS = [
  { q: "What's your main challenge right now?", sub: "Pick the one that fits best.",
    opts: [["time","I don't have time to plan my day"],["consistency","I start good routines but don't stick with them"],["overload","I have too many tools/apps and still feel scattered"],["unclear","I don't know where to start"]] },
  { q: "How does a typical day usually go?", sub: "",
    opts: [["reactive","I just react to whatever comes up"],["plan-fail","I plan but rarely follow through"],["updown","Productive some days, chaotic others"],["behind","I feel behind before the day even starts"]] },
  { q: "How much time can you realistically give this each day?", sub: "Be honest — this decides your starting point, not your goal.",
    opts: [["low","Under 10 minutes"],["mid","10 to 20 minutes"],["have-time","I have more time, I just don't use it well"]] },
  { q: "What usually derails you?", sub: "",
    opts: [["pings","Interruptions and notifications"],["badday","One bad day throws off my whole week"],["momentum","I start strong, then lose momentum"],["never","I never actually start"]] },
  { q: "What kind of support would help most?", sub: "",
    opts: [["checklist","A simple daily checklist"],["survives","Something that survives a bad day"],["simple","A dead-simple system, no extra apps"],["firststep","Just one clear first step"]] },
  { q: "When do you want to start?", sub: "",
    opts: [["today","Today"],["week","This week"],["look","Just looking for now"]] },
];

const PERSONAS = {
  overloaded: {
    tag: "THE OVERLOADED", headline: "Most missed routines aren't a discipline problem.",
    body: "Your plan may simply be asking for more time and mental energy than your week can consistently give it. That's not a willpower gap — it's a design gap.",
    reco: "Your best starting point: <strong>Day 1 and Day 3</strong> of The Reset Week — a 10-minute anchor and one protected hour. Skip the rest until those two are automatic.",
  },
  restarter: {
    tag: "THE CONSTANT RESTARTER", headline: "You don't need another perfect plan.",
    body: "You need a plan that survives an imperfect week — because you already know how to start. Starting was never the problem.",
    reco: "Your best starting point: <strong>Day 4 and Day 7</strong> — the shutdown ritual and the bad-day plan. These are the two pieces that make a system survive a rough Tuesday.",
  },
  overwhelmed: {
    tag: "THE OVERWHELMED PLANNER", headline: "You don't need more systems.",
    body: "You've likely tried several already. The issue isn't information — it's that most systems ask you to track too much to actually run on a busy week.",
    reco: "Your best starting point: <strong>Day 2</strong> — the Top 3. One page, three lines, nothing else to manage.",
  },
  unclear: {
    tag: "THE FOGGY STARTER", headline: "You don't need to know everything yet.",
    body: "You just need a first step small enough to actually take today. Clarity comes from doing the first thing, not from planning the whole system in advance.",
    reco: "Your best starting point: <strong>Day 1</strong> — the brain dump and your anchor time. Everything else builds from there, one day at a time.",
  },
};

let current = 0;
const answers = [];

function renderQuestion() {
  const step = document.getElementById("step");
  const bar = document.getElementById("bar");
  const qText = document.getElementById("q-text");
  const qSub = document.getElementById("q-sub");
  const opts = document.getElementById("options");
  const item = QUESTIONS[current];

  step.textContent = `Question ${current + 1} of ${QUESTIONS.length}`;
  bar.style.width = `${(current / QUESTIONS.length) * 100}%`;
  qText.textContent = item.q;
  qSub.textContent = item.sub;
  opts.innerHTML = "";
  item.opts.forEach(([key, label]) => {
    const b = document.createElement("button");
    b.className = "opt";
    b.textContent = label;
    b.onclick = () => { answers.push(key); current++; current < QUESTIONS.length ? renderQuestion() : showResult(); };
    opts.appendChild(b);
  });
}

function classify() {
  // Simple weighted scoring — behavior-only, no health/medical inputs.
  const score = { overloaded: 0, restarter: 0, overwhelmed: 0, unclear: 0 };
  const map = {
    time: "overloaded", consistency: "restarter", overload: "overwhelmed", unclear: "unclear",
    reactive: "overloaded", "plan-fail": "restarter", updown: "restarter", behind: "unclear",
    low: "overloaded", pings: "overloaded", badday: "restarter", momentum: "restarter", never: "unclear",
    checklist: "overloaded", survives: "restarter", simple: "overwhelmed", firststep: "unclear",
  };
  answers.forEach(a => { if (map[a]) score[map[a]]++; });
  return Object.entries(score).sort((a, b) => b[1] - a[1])[0][0];
}

function showResult() {
  document.getElementById("quiz").classList.add("hidden");
  const key = classify();
  const p = PERSONAS[key];
  const r = document.getElementById("result");
  r.classList.remove("hidden");
  r.innerHTML = `
    <span class="tag">${p.tag}</span>
    <h2>${p.headline}</h2>
    <p>${p.body}</p>
    <div class="reco">${p.reco}</div>
    <a class="cta" href="#checkout-link-quiz" target="_blank" rel="noopener">Get The Reset Week — $9</a>
    <p class="apoio">Instant download · 7-day guarantee · No app required</p>
    <p class="apoio" style="margin-top:14px">Results are individual and vary based on effort and consistency. The Reset Week is an educational productivity tool and does not guarantee specific outcomes.</p>
    <span class="restart" onclick="location.reload()">Retake the assessment</span>
  `;
}

renderQuestion();
</script>
</body>
</html>
